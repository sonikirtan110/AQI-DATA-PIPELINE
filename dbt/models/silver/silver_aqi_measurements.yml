version: 2

models:
  - name: silver_aqi_measurements
    description: Cleaned AQI records parsed from bronze JSON payload.
    columns:
      - name: measurement_id
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: pollutant
        tests:
          - not_null
      - name: measured_at
        tests:
          - not_null
      - name: sub_index
        description: Pollutant-level AQI sub-index using CPCB breakpoint formulas.
        tests:
          - not_null:
              config:
                where: "pollutant in ('PM2.5', 'PM10', 'NO2', 'SO2', 'CO', 'OZONE', 'NH3')"
